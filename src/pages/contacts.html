<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/index.css" />
    <link rel="stylesheet" href="../styles/contacts.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="center">
        <h1>🌍 Saúde e Segurança do trabalho</h1>
        <nav class="navbar">
          <ul>
            <li><a href="../index.html">Home</a></li>
             <li><a href="content.html">Conteúdo</a></li>
            <li><a href="contacts.html">Contatos</a></li>
           
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="contactContainer">
        <h1>Entre em contato conosco!</h1>
        <form>
          <div class="inputContainer">
            <label for="name">Nome:</label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Digite seu nome"
            />
          </div>
          <div class="inputContainer">
            <label for="email">E-mail:</label>
            <input
              type="text"
              name="email"
              id="email"
              placeholder="Digite seu email"
            />
          </div>
          <textarea
            name="description"
            id="description"
            placeholder="Descrição"
          ></textarea>
          <div class="btnContainer"><input type="submit" value="Enviar" /></div>
        </form>
      </section>
    </main>
    <footer>
      <div>
        <p>Todos direitos reservados <strong>&copy;</strong></p>
      </div>
    </footer>
  </body>
</html>
